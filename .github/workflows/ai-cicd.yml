name: AI CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      registry:
        description: Container registry to push to
        required: true
        default: ghcr
        type: choice
        options:
          - ghcr
          - dockerhub
          - ecr

concurrency:
  group: enterprise-ai-cicd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  APP_NAME: career-connect
  CHART_PATH: ./charts/career-connect
  DEV_NAMESPACE: career-connect-dev
  QA_NAMESPACE: career-connect-qa
  PROD_NAMESPACE: career-connect-prod
  OPENAI_DEFAULT_MODEL: gpt-4.1-mini

jobs:
  enterprise-governance:
    name: Enterprise governance and AI risk assessment
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enterprise policy checks
        run: |
          set -euo pipefail
          test -f Dockerfile
          test -f nginx.conf
          test -f charts/career-connect/Chart.yaml
          test -f charts/career-connect/values.yaml
          test -f .github/workflows/ai-cicd.yml
          if grep -RInE "(sk-[A-Za-z0-9_-]{20,}|(OPENAI_API_KEY|[Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd]|[Tt][Oo][Kk][Ee][Nn]|API_TOKEN|SECRET|AWS_SECRET_ACCESS_KEY)=[A-Za-z0-9_./+=:-]{12,})" \
            --exclude-dir=.git \
            --exclude=".github/workflows/ai-cicd.yml" .; then
            echo "::error::Potential secret value found in repository files."
            exit 1
          fi

      - name: OpenAI enterprise change risk assessment
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          set -euo pipefail
          OPENAI_MODEL="${OPENAI_MODEL:-$OPENAI_DEFAULT_MODEL}"
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured. Skipping OpenAI enterprise risk assessment."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --stat "origin/${{ github.base_ref }}"...HEAD > change-stat.txt
            git diff --unified=0 "origin/${{ github.base_ref }}"...HEAD > enterprise-change.diff
          else
            git show --stat --format=short HEAD > change-stat.txt
            git show --format=short --unified=0 HEAD > enterprise-change.diff
          fi

          CHANGE_JSON=$(jq -Rs . < enterprise-change.diff)
          jq -n \
            --arg model "$OPENAI_MODEL" \
            --argjson change "$CHANGE_JSON" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You are an enterprise CI/CD risk officer. Review the change for release, security, compliance, operational, rollback, and customer-impact risk. Return Markdown with risk level, required approvals, rollback notes, and go/no-go recommendation."
                },
                {
                  role: "user",
                  content: ("Assess this repository change for enterprise production release:\n\n" + $change)
                }
              ],
              temperature: 0.1
            }' > openai-enterprise-risk-request.json

          curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @openai-enterprise-risk-request.json \
            | jq -r '.choices[0].message.content // "OpenAI enterprise risk assessment did not return content."' \
            | tee openai-enterprise-risk.md

      - name: Upload enterprise governance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-governance
          path: |
            change-stat.txt
            openai-enterprise-risk.md
          if-no-files-found: ignore

  ai-code-review-security-scan:
    name: AI code review and security scan
    runs-on: ubuntu-latest
    needs: enterprise-governance
    permissions:
      contents: read
      packages: write

    steps:
      - name: Developer code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI tool map for CI/CD
        run: |
          cat > ai-tools-used.md <<'EOF'
          | Purpose | AI Tool |
          | --- | --- |
          | Code suggestion | GitHub Copilot |
          | Code review | ChatGPT / Codex |
          | Vulnerability fix suggestion | Snyk AI / GitHub Advanced Security |
          | Test case generation | Codex / Copilot |
          | Log analysis | ChatGPT / AWS Q Developer |
          | Pipeline error fixing | ChatGPT / Codex |
          EOF
          cat ai-tools-used.md

      - name: AI code review with ChatGPT or Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          set -euo pipefail
          OPENAI_MODEL="${OPENAI_MODEL:-$OPENAI_DEFAULT_MODEL}"
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured. Skipping AI code review."
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --unified=0 "origin/${{ github.base_ref }}"...HEAD > code.diff
          else
            git show --format=short --unified=0 HEAD > code.diff
          fi

          if [ ! -s code.diff ]; then
            echo "No code diff available for AI review."
            exit 0
          fi

          DIFF_JSON=$(jq -Rs . < code.diff)
          jq -n \
            --arg model "$OPENAI_MODEL" \
            --argjson diff "$DIFF_JSON" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You are an AI CI/CD reviewer. Find correctness, security, reliability, and deployment risks. Return concise Markdown with severity and file references when possible."
                },
                {
                  role: "user",
                  content: ("Review this git diff:\n\n" + $diff)
                }
              ],
              temperature: 0.2
            }' > ai-review-request.json

          curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @ai-review-request.json \
            | jq -r '.choices[0].message.content // "AI review did not return content."' \
            | tee ai-code-review.md

      - name: Upload AI review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-code-review
          path: |
            ai-tools-used.md
            ai-code-review.md
          if-no-files-found: ignore

      - name: Pipeline error fixing with ChatGPT or Codex
        run: |
          cat > pipeline-error-fixing.md <<'EOF'
          # Pipeline Error Fixing

          Use ChatGPT / Codex to inspect failed GitHub Actions jobs, summarize the failing step, and suggest a focused fix.

          Current pipeline guidance:
          - Check annotations on failed jobs first.
          - Fix missing secrets before changing deployment logic.
          - Keep AI review, security scan, build, tests, image push, and deployments as separate stages.
          EOF
          cat pipeline-error-fixing.md

      - name: Upload pipeline fixing guidance
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-error-fixing
          path: pipeline-error-fixing.md

      - name: Vulnerability fix suggestion with Snyk AI or GitHub Advanced Security
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$SNYK_TOKEN" ]; then
            echo "SNYK_TOKEN is not configured. Use Snyk AI or GitHub Advanced Security for vulnerability fix suggestions."
            exit 0
          fi
          echo "SNYK_TOKEN is configured. Run Snyk AI-backed vulnerability analysis in this stage."

      - name: OpenAI security remediation advisor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          set -euo pipefail
          OPENAI_MODEL="${OPENAI_MODEL:-$OPENAI_DEFAULT_MODEL}"
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured. Skipping OpenAI security remediation advisor."
            exit 0
          fi

          find . -maxdepth 3 -type f \
            \( -name "Dockerfile" -o -name "*.yaml" -o -name "*.yml" -o -name "*.js" -o -name "*.html" -o -name "*.css" \) \
            -not -path "./.git/*" \
            -print > security-file-list.txt

          FILES_JSON=$(jq -Rs . < security-file-list.txt)
          jq -n \
            --arg model "$OPENAI_MODEL" \
            --argjson files "$FILES_JSON" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You are an enterprise application security advisor. Recommend practical vulnerability fixes and hardening controls for the listed repository files. Return concise Markdown grouped by priority."
                },
                {
                  role: "user",
                  content: ("Suggest enterprise security remediation for these files and this stack:\n\n" + $files)
                }
              ],
              temperature: 0.1
            }' > openai-security-remediation-request.json

          curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @openai-security-remediation-request.json \
            | jq -r '.choices[0].message.content // "OpenAI security remediation did not return content."' \
            | tee openai-security-remediation.md

      - name: Upload security remediation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openai-security-remediation
          path: |
            security-file-list.txt
            openai-security-remediation.md
          if-no-files-found: ignore

      - name: Trivy filesystem vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

  build-application:
    name: Build application
    runs-on: ubuntu-latest
    needs: ai-code-review-security-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate static application files
        run: |
          test -f public/index.html
          test -f public/styles.css
          test -f public/app.js
          test -f Dockerfile
          test -f nginx.conf

      - name: Package application artifact
        run: |
          mkdir -p dist
          cp -r public nginx.conf Dockerfile charts dist/
          tar -czf career-connect-build.tar.gz dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: career-connect-build
          path: career-connect-build.tar.gz

  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    needs: build-application

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: HTML smoke test
        run: |
          grep -q "Linkdin Professional Network" public/index.html
          grep -q "Nakari Job Portal" public/index.html
          grep -q "Career Connect" public/index.html

      - name: JavaScript syntax test
        run: node --check public/app.js

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm chart structure test
        run: |
          test -f charts/career-connect/Chart.yaml
          test -f charts/career-connect/values.yaml
          test -f charts/career-connect/templates/deployment.yaml
          helm lint charts/career-connect

      - name: Test case generation with Codex or Copilot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          set -euo pipefail
          OPENAI_MODEL="${OPENAI_MODEL:-$OPENAI_DEFAULT_MODEL}"
          cat > test-context.txt <<'EOF'
          Application: static Nginx-hosted Career Connect site.
          Important files: public/index.html, public/styles.css, public/app.js, Dockerfile, nginx.conf, charts/career-connect.
          Existing checks: HTML smoke test, JavaScript syntax check, Helm lint.
          EOF

          if [ -z "$OPENAI_API_KEY" ]; then
            cat > generated-test-ideas.md <<'EOF'
          # AI Test Case Generation
          Suggested by Codex / Copilot:
          - Verify both Linkdin and Nakari views render from hash navigation.
          - Verify `public/app.js` activates the default view when the URL hash is empty.
          - Verify Helm chart renders Deployment, Service, and ServiceAccount templates.
          - Verify `/healthz` returns `ok` from the Nginx container.
          EOF
            cat generated-test-ideas.md
            exit 0
          fi

          TEST_CONTEXT_JSON=$(jq -Rs . < test-context.txt)
          jq -n \
            --arg model "$OPENAI_MODEL" \
            --argjson context "$TEST_CONTEXT_JSON" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You are an enterprise QA architect. Generate high-value test cases for CI, deployment, rollback, security, accessibility, and production smoke checks. Return Markdown."
                },
                {
                  role: "user",
                  content: ("Generate enterprise-grade test cases for this application context:\n\n" + $context)
                }
              ],
              temperature: 0.2
            }' > openai-test-generation-request.json

          curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @openai-test-generation-request.json \
            | jq -r '.choices[0].message.content // "OpenAI test generation did not return content."' \
            | tee generated-test-ideas.md

      - name: Upload generated test ideas
        uses: actions/upload-artifact@v4
        with:
          name: generated-test-ideas
          path: generated-test-ideas.md

  docker-image:
    name: Docker image build and push
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      attestations: write
      id-token: write
      packages: write

    outputs:
      image_repository: ${{ steps.image.outputs.repository }}
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select image target
        id: image
        env:
          REGISTRY_INPUT: ${{ github.event.inputs.registry || 'ghcr' }}
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          if [ "$REGISTRY_INPUT" = "ecr" ]; then
            if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ] || [ -z "${{ secrets.AWS_REGION }}" ]; then
              echo "::error::AWS_ACCOUNT_ID and AWS_REGION secrets are required for ECR pushes."
              exit 1
            fi
            IMAGE_REPOSITORY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${APP_NAME}"
          elif [ "$REGISTRY_INPUT" = "dockerhub" ]; then
            if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
              echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required for Docker Hub pushes."
              exit 1
            fi
            IMAGE_REPOSITORY="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${APP_NAME}"
          else
            IMAGE_REPOSITORY="ghcr.io/${GITHUB_REPOSITORY,,}/${APP_NAME}"
          fi
          echo "repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: ${{ github.event.inputs.registry == 'ecr' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: ${{ github.event.inputs.registry == 'ecr' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to Docker Hub
        if: ${{ github.event.inputs.registry == 'dockerhub' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: ${{ github.event.inputs.registry == '' || github.event.inputs.registry == 'ghcr' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}

      - name: Trivy image vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  enterprise-release-readiness:
    name: Enterprise release readiness
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: OpenAI production readiness report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          IMAGE_REPOSITORY: ${{ needs.docker-image.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.docker-image.outputs.image_tag }}
        run: |
          set -euo pipefail
          OPENAI_MODEL="${OPENAI_MODEL:-$OPENAI_DEFAULT_MODEL}"
          cat > release-context.txt <<EOF
          App: ${APP_NAME}
          Image: ${IMAGE_REPOSITORY}:${IMAGE_TAG}
          Chart: ${CHART_PATH}
          Environments: dev, qa, production-approval, production
          Deployment strategy: Helm upgrade/install with rollout status checks
          Supply chain: Docker build-push-action with provenance and SBOM enabled
          EOF

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not configured. Skipping OpenAI production readiness report."
            exit 0
          fi

          RELEASE_CONTEXT_JSON=$(jq -Rs . < release-context.txt)
          jq -n \
            --arg model "$OPENAI_MODEL" \
            --argjson context "$RELEASE_CONTEXT_JSON" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You are an enterprise release manager. Create a production readiness report with release summary, risk, approvals, validation plan, rollback plan, monitoring plan, and go/no-go criteria. Return Markdown."
                },
                {
                  role: "user",
                  content: ("Create a production readiness report from this context:\n\n" + $context)
                }
              ],
              temperature: 0.1
            }' > openai-release-readiness-request.json

          curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @openai-release-readiness-request.json \
            | jq -r '.choices[0].message.content // "OpenAI release readiness did not return content."' \
            | tee openai-release-readiness.md

      - name: Upload release readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-release-readiness
          path: |
            release-context.txt
            openai-release-readiness.md
          if-no-files-found: ignore

  deployment-preflight:
    name: Deployment preflight
    runs-on: ubuntu-latest
    needs:
      - docker-image
      - enterprise-release-readiness
    if: github.event_name != 'pull_request'

    outputs:
      can_deploy: ${{ steps.preflight.outputs.can_deploy }}

    steps:
      - name: Check remote deployment secrets
        id: preflight
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "KUBE_CONFIG_B64 is not configured. Kubernetes deployment jobs will be skipped."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "Remote Kubernetes kubeconfig found."
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs:
      - docker-image
      - deployment-preflight
    if: needs.deployment-preflight.outputs.can_deploy == 'true'
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure remote kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "::error::Missing KUBE_CONFIG_B64 secret for remote Kubernetes cluster."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy Helm release to Dev
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          kubectl create namespace "$DEV_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          HELM_PULL_SECRET=""
          if [[ "${{ needs.docker-image.outputs.image_repository }}" == ghcr.io/* ]]; then
            kubectl create secret docker-registry ghcr-pull-secret \
              --namespace "$DEV_NAMESPACE" \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USERNAME" \
              --docker-password="$GHCR_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
            HELM_PULL_SECRET="--set imagePullSecrets[0].name=ghcr-pull-secret"
          elif [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            kubectl create secret docker-registry dockerhub-pull-secret \
              --namespace "$DEV_NAMESPACE" \
              --docker-server=docker.io \
              --docker-username="$DOCKERHUB_USERNAME" \
              --docker-password="$DOCKERHUB_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
            HELM_PULL_SECRET="--set imagePullSecrets[0].name=dockerhub-pull-secret"
          fi
          helm upgrade --install "${APP_NAME}-dev" "$CHART_PATH" \
            --namespace "$DEV_NAMESPACE" \
            --create-namespace \
            --set image.repository="${{ needs.docker-image.outputs.image_repository }}" \
            --set image.tag="${{ needs.docker-image.outputs.image_tag }}" \
            $HELM_PULL_SECRET
          kubectl rollout status "deployment/${APP_NAME}-dev" --namespace "$DEV_NAMESPACE" --timeout=180s

      - name: Dev smoke test
        run: |
          kubectl get pods --namespace "$DEV_NAMESPACE" \
            --selector "app.kubernetes.io/name=career-connect" \
            -o wide

  deploy-test-qa:
    name: Deploy to Test / QA
    runs-on: ubuntu-latest
    needs:
      - docker-image
      - deployment-preflight
      - deploy-dev
    if: needs.deployment-preflight.outputs.can_deploy == 'true'
    environment: qa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure remote kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "::error::Missing KUBE_CONFIG_B64 secret for remote Kubernetes cluster."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy Helm release to Test / QA
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          kubectl create namespace "$QA_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          HELM_PULL_SECRET=""
          if [[ "${{ needs.docker-image.outputs.image_repository }}" == ghcr.io/* ]]; then
            kubectl create secret docker-registry ghcr-pull-secret \
              --namespace "$QA_NAMESPACE" \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USERNAME" \
              --docker-password="$GHCR_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
            HELM_PULL_SECRET="--set imagePullSecrets[0].name=ghcr-pull-secret"
          elif [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            kubectl create secret docker-registry dockerhub-pull-secret \
              --namespace "$QA_NAMESPACE" \
              --docker-server=docker.io \
              --docker-username="$DOCKERHUB_USERNAME" \
              --docker-password="$DOCKERHUB_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
            HELM_PULL_SECRET="--set imagePullSecrets[0].name=dockerhub-pull-secret"
          fi
          helm upgrade --install "${APP_NAME}-qa" "$CHART_PATH" \
            --namespace "$QA_NAMESPACE" \
            --create-namespace \
            --set image.repository="${{ needs.docker-image.outputs.image_repository }}" \
            --set image.tag="${{ needs.docker-image.outputs.image_tag }}" \
            $HELM_PULL_SECRET
          kubectl rollout status "deployment/${APP_NAME}-qa" --namespace "$QA_NAMESPACE" --timeout=180s

      - name: QA smoke test
        run: |
          kubectl get pods --namespace "$QA_NAMESPACE" \
            --selector "app.kubernetes.io/name=career-connect" \
            -o wide

  manual-approval-production:
    name: Manual approval
    runs-on: ubuntu-latest
    needs: deploy-test-qa
    if: needs.deploy-test-qa.result == 'success'
    environment: production-approval

    steps:
      - name: Await production approval
        run: |
          echo "Production deployment requires GitHub environment approval."
          echo "Review enterprise-release-readiness and ai-code-review artifacts before approval."

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs:
      - docker-image
      - deployment-preflight
      - manual-approval-production
    if: needs.deployment-preflight.outputs.can_deploy == 'true' && needs.manual-approval-production.result == 'success'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure remote kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "::error::Missing KUBE_CONFIG_B64 secret for remote Kubernetes cluster."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy Helm release to Production
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          kubectl create namespace "$PROD_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          HELM_PULL_SECRET=""
          if [[ "${{ needs.docker-image.outputs.image_repository }}" == ghcr.io/* ]]; then
            kubectl create secret docker-registry ghcr-pull-secret \
              --namespace "$PROD_NAMESPACE" \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USERNAME" \
              --docker-password="$GHCR_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
            HELM_PULL_SECRET="--set imagePullSecrets[0].name=ghcr-pull-secret"
          elif [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            kubectl create secret docker-registry dockerhub-pull-secret \
              --namespace "$PROD_NAMESPACE" \
              --docker-server=docker.io \
              --docker-username="$DOCKERHUB_USERNAME" \
              --docker-password="$DOCKERHUB_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
            HELM_PULL_SECRET="--set imagePullSecrets[0].name=dockerhub-pull-secret"
          fi
          helm upgrade --install "$APP_NAME" "$CHART_PATH" \
            --namespace "$PROD_NAMESPACE" \
            --create-namespace \
            --set image.repository="${{ needs.docker-image.outputs.image_repository }}" \
            --set image.tag="${{ needs.docker-image.outputs.image_tag }}" \
            $HELM_PULL_SECRET
          kubectl rollout status "deployment/${APP_NAME}" --namespace "$PROD_NAMESPACE" --timeout=180s

      - name: Production smoke test
        run: |
          kubectl get pods --namespace "$PROD_NAMESPACE" \
            --selector "app.kubernetes.io/name=career-connect" \
            -o wide

  ai-log-analysis-monitoring:
    name: AI log analysis and monitoring
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always() && needs.deploy-production.result == 'success' && github.event_name != 'pull_request'

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure remote kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
        run: |
          if [ -z "$KUBE_CONFIG_B64" ]; then
            echo "KUBE_CONFIG_B64 is not configured. Skipping Kubernetes log collection."
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Collect production logs
        continue-on-error: true
        run: |
          kubectl logs \
            --namespace "$PROD_NAMESPACE" \
            --selector "app.kubernetes.io/name=${APP_NAME}" \
            --tail=300 \
            --all-containers=true > production-logs.txt

      - name: AI log analysis with ChatGPT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: |
          set -euo pipefail
          OPENAI_MODEL="${OPENAI_MODEL:-$OPENAI_DEFAULT_MODEL}"
          if [ -z "$OPENAI_API_KEY" ] || [ ! -s production-logs.txt ]; then
            echo "AI log analysis with ChatGPT / AWS Q Developer skipped because OPENAI_API_KEY or logs are unavailable."
            exit 0
          fi

          LOG_JSON=$(jq -Rs . < production-logs.txt)
          jq -n \
            --arg model "$OPENAI_MODEL" \
            --argjson logs "$LOG_JSON" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You are an AI production monitoring assistant. Summarize errors, likely causes, and next actions from deployment logs."
                },
                {
                  role: "user",
                  content: ("Analyze these Kubernetes production logs:\n\n" + $logs)
                }
              ],
              temperature: 0.2
            }' > ai-log-analysis-request.json

          curl -sS https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @ai-log-analysis-request.json \
            | jq -r '.choices[0].message.content // "AI log analysis did not return content."' \
            | tee ai-log-analysis.md

      - name: Upload monitoring reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-log-analysis-monitoring
          path: |
            production-logs.txt
            ai-log-analysis.md
          if-no-files-found: ignore
